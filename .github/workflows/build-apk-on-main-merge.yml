name: Build APK On Main Merge

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  build-and-distribute:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Prepare Firebase credentials
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if echo "$FIREBASE_SERVICE_ACCOUNT" | jq -e . >/dev/null 2>&1; then
            echo "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase_service_account.json"
          else
            echo "$FIREBASE_SERVICE_ACCOUNT" | base64 --decode > "$RUNNER_TEMP/firebase_service_account.json"
          fi
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase_service_account.json" >> "$GITHUB_ENV"

      - name: Upload APK to Firebase App Distribution
        env:
          FIREBASE_APP_ID_ANDROID: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
          FIREBASE_TESTERS: ${{ secrets.FIREBASE_TESTERS }}
          FIREBASE_GROUPS: ${{ secrets.FIREBASE_GROUPS }}
          RELEASE_NOTES: "PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"
        run: |
          CMD=(firebase appdistribution:distribute "build/app/outputs/flutter-apk/app-release.apk" --app "$FIREBASE_APP_ID_ANDROID" --release-notes "$RELEASE_NOTES")

          if [ -n "$FIREBASE_TESTERS" ]; then
            CMD+=(--testers "$FIREBASE_TESTERS")
          fi

          if [ -n "$FIREBASE_GROUPS" ]; then
            CMD+=(--groups "$FIREBASE_GROUPS")
          fi

          "${CMD[@]}"
